<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Grade Demo</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#eef4ff,#f8fafc);
}
.container{
  width:min(900px,92%);
  margin:40px auto;
}
.card{
  background:white;
  border-radius:20px;
  padding:24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.1);
}
input{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.result{
  margin-top:16px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>Student Grade Calculator</h2>

    <label>Assignment</label>
    <input id="a" value="80">

    <label>Midterm</label>
    <input id="m" value="75">

    <label>Final</label>
    <input id="f" value="90">

    <button onclick="calc()">Calculate</button>

    <div class="result" id="r">Result: -</div>
  </div>
</div>

<script>
function calc(){
  let a=Number(document.getElementById("a").value);
  let m=Number(document.getElementById("m").value);
  let f=Number(document.getElementById("f").value);

  let total=(a*0.2+m*0.3+f*0.5).toFixed(1);
  let status= total>=50 ? "Pass" : "Fail";

  document.getElementById("r").innerHTML =
    "Total: "+total+" | "+status;
}
</script>

</body>
</html>
